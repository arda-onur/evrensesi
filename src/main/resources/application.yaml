spring:
  application:
    name: evrensesi
  data:
    redis:
      host: localhost
      port: 6379
  elasticsearch:
    uris:http://elasticsearch:9200
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  messages:
    basename: ExceptionMessages,ValidationMessages
    encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto:validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  logging:
    level:
      root: INFO
      com.arda.evrensesi: DEBUG
server:
  servlet:
    session:
      timeout: 30m
management:
 endpoints:
  web:
   exposure:
    include: health,prometheus,info